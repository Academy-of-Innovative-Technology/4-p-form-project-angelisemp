<!DOCTYPE html>
<HTML>
    <head>
<meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4.6 datalist tags</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    
    </head>

<body>
    <div>
    <h1>Pizza Form</h1>
    <h2>Sign In:</h2>
    <form name="Pizza" action="#" method="POST">
      <label for="fullname" required> Type your name for the order:</label> <br>
      <input name="fullname" type="text"> <br>
      <br>
    <label for="password" required> Enter your password:</label> <br>
    <input name="address" type="password"> <br>
     <br>
     <input type="submit" value="Submit" id="button1"><br>

    <br>
    <fieldset id="pizza-sec">
            <legend>Personalized Pizza</legend>
      <br>
       <label for="email" required > Type your email for the order:</label> <br>
      <input name="email" type="email"> 
      <br>

      <br>
<label for="pizza">Select your Dish:</label>
      <br>
<label>Pizza Slice</label> <input type="radio" id="crust" list="crust" name="crust">
<label>Whole Pizza</label> <input type="radio" id="crust" list="crust" name="crust">
      <br>

<br> <label for="dough">Select or type your Pizza Crust:</label>
        <br>
        <input name="crust" id="crust" list="crust_list"> <br>
         <datalist id="crust_list" list="crust">
            <option value="Regular"></option>
            <option value="Thin"></option>
            <option value="Cheese"></option>
            <option value="Deep-dish"></option>
            <option value="Gluten free"></option>
         </datalist>
        <br>

    <label for="toppings">Select or type your Pizza Toppings:</label>
        <br>
        <input name="toppings" list="toppings_list" id="toppings"/> <br>
        <br>
        <input type="submit" value="Submit">
         <br>
         <datalist id="toppings_list">
            <option value="Pepperoni">Pepperoni</option>
            <option value="Ham and Pineapple"></option>
            <option value="Bacon"></option>
            <option value="Sausage"></option>
            <option value="Chicken"></option>
            <option value="Peppers"></option>
            <option value="Mushroom"></option>
            <option value="Onions"></option>
        </datalist>
        </fieldset>
        </form>
        </div>
        <script src="script.js"></script>
</body>
</HTML>
